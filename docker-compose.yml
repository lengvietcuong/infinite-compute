services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: infinite_compute
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: lengvietcuong/infinite-compute-backend:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/infinite_compute
      SECRET_KEY: dev-secret-key
      CORS_ORIGINS: http://localhost:5173
      # Optional: set these to enable the AI advisor feature
      # OPEN_ROUTER_API_KEY: your-open-router-api-key
      # BRAVE_API_KEY: your-brave-api-key
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: lengvietcuong/infinite-compute-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
